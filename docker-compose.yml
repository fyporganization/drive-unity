services:
  driveunity-psql:
    image: pgvector/pgvector:pg16
    container_name: driveunity-psql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - driveunity-pgdata:/var/lib/postgresql/data
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_REPO}:${DOCKER_TAG}
    container_name: drive-unity-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      driveunity-psql:
        condition: service_healthy
    networks:
      - traefik-network
      - temporal-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"

      # HTTPS router — Traefik terminates TLS via Let's Encrypt
      - "traefik.http.routers.drive-unity.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.drive-unity.entrypoints=websecure"
      - "traefik.http.routers.drive-unity.tls=true"
      - "traefik.http.routers.drive-unity.tls.certresolver=production"
      - "traefik.http.services.drive-unity.loadbalancer.server.port=3000"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.drive-unity-http.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.drive-unity-http.entrypoints=web"
      - "traefik.http.routers.drive-unity-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

  worker:
    image: ${DOCKER_REPO}:${DOCKER_TAG}
    container_name: drive-unity-worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["node_modules/.bin/tsx", "worker/index.ts"]
    networks:
      - traefik-network
      - temporal-network
    depends_on:
      - app
      - driveunity-psql
    labels:
      - "traefik.enable=false"

volumes:
  driveunity-pgdata:

networks:
  traefik-network:
    external: true
  temporal-network:
    external: true
    name: temporal_temporal-network
