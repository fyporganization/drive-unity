# SonarQube / SonarCloud project configuration

sonar.sources=src
sonar.tests=src

# Generated / vendored code must not be analyzed.
# - prisma/migrations: auto-generated by `prisma migrate`; the SQL is not
#   hand-maintained. SonarQube analyzes these with its Oracle (PL/SQL) ruleset,
#   which produces false positives for a PostgreSQL project (e.g. "use VARCHAR2
#   instead of VARCHAR", "add a size constraint") — none of which are valid for
#   Postgres.
# - src/generated: the generated Prisma client.
sonar.exclusions=prisma/migrations/**,src/generated/**,**/node_modules/**,**/*.config.js,**/*.config.mjs,**/*.config.ts
